<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5; stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#2ecc71; stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <circle cx="50" cy="50" r="30" fill="url(#grad1)"></circle>
  
  <!-- Upward trend line inside circle -->
  <polyline points="30,60 45,45 60,55 70,35" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>

  <!-- Company Name -->
  <text x="100" y="60" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#1e88e5" font-weight="600">
    Elist
  </text>
</svg>